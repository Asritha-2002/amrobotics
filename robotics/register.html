<!DOCTYPE html>
<html class="no-js" lang="zxx" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Register - AM ROBOTICS</title>
    <meta name="author" content="AM ROBOTICS">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.min.css">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
   <style>
/* ===============================
   PAGE WRAPPER
================================ */
.register-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #0b0b0b 0%, #0f1b2d 100%);
}

/* ===============================
   REGISTER CARD
================================ */
.register-container {
    width: 100%;
    max-width: 500px;
    background: #ffffff;
    padding: 50px;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
}

/* ===============================
   HEADER
================================ */
.register-header {
    text-align: center;
    margin-bottom: 40px;
}

.register-header h1 {
    font-size: 28px;
    color: #000000;
    margin-bottom: 10px;
    font-weight: 700;
}

.register-header p {
    color: #6b7280;
    font-size: 14px;
    margin: 0;
}

/* ===============================
   FORM
================================ */
.form-group {
    margin-bottom: 22px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #374151;
    font-weight: 500;
    font-size: 14px;
}

.form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 30px;
    font-size: 14px;
    transition: all 0.25s ease;
    background: #ffffff;
}

/* INPUT FOCUS (BLUE ACCENT) */
.form-group input:focus {
    border-color: #2563eb;
    outline: none;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

/* ===============================
   PRIMARY BUTTON
================================ */
.register-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #111827 0%, #1e3a8a 100%);
    color: #ffffff;
    border: none;
    border-radius: 30px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 10px;
}

.register-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(30, 58, 138, 0.35);
}

.register-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

/* ===============================
   FOOTER
================================ */
.register-footer {
    text-align: center;
    margin-top: 22px;
}

.register-footer p {
    color: #6b7280;
    font-size: 14px;
}

.register-footer a {
    color: #1e40af;
    font-weight: 600;
    text-decoration: none;
}

.register-footer a:hover {
    text-decoration: underline;
}

/* ===============================
   MESSAGES
================================ */
.error-message {
    color: #1e40af;
    font-size: 13px;
    margin-top: 6px;
    display: none;
}

.success-message {
    color: #047857;
    font-size: 13px;
    margin-top: 6px;
    display: none;
}

.loading {
    display: none;
    text-align: center;
    color: #6b7280;
    font-size: 14px;
}

/* ===============================
   BACK LINK
================================ */
.back-link {
    display: inline-block;
    margin-bottom: 30px;
    color: #6b7280;
    text-decoration: none;
    font-size: 14px;
}

.back-link:hover {
    color: #1e40af;
}

/* ===============================
   MOBILE
================================ */
@media (max-width: 576px) {
    .register-container {
        padding: 36px 26px;
    }

    .register-header h1 {
        font-size: 24px;
    }
}
</style>

</head>

<body>
    <div class="register-wrapper">
        <div class="register-container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="register-header">
                <h1>Create Account</h1>
                <p>Sign up to get started</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <div class="error-message" id="nameError"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">Create Account</button>
                <div class="loading" id="loading">
                    <i class="fas fa-spinner fa-spin"></i> Creating account...
                </div>
                <div class="error-message" id="generalError"></div>
                <div class="success-message" id="successMessage"></div>
            </form>

            <div class="register-footer">
                <p>Already have an account? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/vendor/jquery-3.7.1.min.js"></script>
    <script src="assets/js/app.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
       // const API_BASE = 'https://paypal.variants.ecomsandbox.softpages.in/api';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.getElementById('generalError').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            // Validation
            if (!name) {
                document.getElementById('nameError').textContent = 'Name is required';
                document.getElementById('nameError').style.display = 'block';
                return;
            }
            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                document.getElementById('emailError').style.display = 'block';
                return;
            }
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                document.getElementById('passwordError').style.display = 'block';
                return;
            }
            if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                document.getElementById('passwordError').style.display = 'block';
                return;
            }
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
                document.getElementById('confirmPasswordError').style.display = 'block';
                return;
            }

            document.getElementById('registerBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(`${CONFIG.API_BASE}/user/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Registration failed');
                }

                // Store token and user info
                document.getElementById('successMessage').textContent =
    'Registration successful! Please check your email and verify your account before logging in.';

document.getElementById('successMessage').style.display = 'block';

            } catch (error) {
                console.error('Registration error:', error);
                document.getElementById('generalError').textContent = error.message || 'An error occurred. Please try again.';
                document.getElementById('generalError').style.display = 'block';
            } finally {
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
</body>

</html>
